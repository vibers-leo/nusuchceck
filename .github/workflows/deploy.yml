name: Deploy to NCP Docker

on:
  push:
    branches: [main]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false
      - name: Install brakeman & bundler-audit
        run: gem install brakeman bundler-audit --no-document
      - name: Brakeman (static security analysis)
        # -w 2: High 이상 경고 시 실패, EOL 경고는 제외 (Ruby/Rails 버전 업그레이드는 별도 관리)
        run: brakeman --no-pager -q -w 2 --except EOLRuby,EOLRails
      - name: bundler-audit (gem CVE check)
        # CVE-2026-33658 (activestorage DoS): Rails 7.2+ 업그레이드 필요 — 별도 마일스톤으로 관리
        run: bundle-audit check --update --ignore CVE-2026-33658

  deploy:
    needs: security_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /root/projects/nusucheck

            echo "▶ git pull..."
            git stash || true
            git pull origin main
            git stash pop || true

            echo "▶ 이미지 빌드..."
            docker compose build app sidekiq

            echo "▶ 기존 컨테이너 정리 (충돌 방지)..."
            docker rm -f nusucheck-app nusucheck-sidekiq 2>/dev/null || true

            echo "▶ 컨테이너 재시작 (app/sidekiq only)..."
            docker compose up -d --no-deps app sidekiq

            echo "▶ DB 마이그레이션..."
            sleep 20
            docker exec nusucheck-app bin/rails db:migrate || true

            echo "▶ 헬스체크..."
            sleep 5
            curl -sf http://localhost:4080/up || (echo "❌ 헬스체크 실패!" && docker logs nusucheck-app --tail=30 && exit 1)

            echo "▶ NPM nginx reload (502 방지)..."
            docker exec npm-app-1 nginx -s reload || true

            echo "▶ 컨테이너 상태 확인..."
            docker compose ps

            echo "✅ Deploy complete: $(date)"

      - name: Cleanup old images
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            docker image prune -af --filter "until=24h"
            docker builder prune -af --filter "until=24h"
