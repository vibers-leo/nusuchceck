name: Deploy to NCP Docker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /root/projects/nusucheck

            echo "▶ git pull..."
            git stash || true
            git pull origin main
            git stash pop || true

            echo "▶ 기존 컨테이너 정리 (충돌 방지)..."
            docker rm -f nusucheck-app nusucheck-sidekiq 2>/dev/null || true

            echo "▶ docker compose rebuild & restart (app/sidekiq only)..."
            docker compose up -d --build --no-deps app sidekiq

            echo "▶ DB 마이그레이션..."
            sleep 20
            docker exec nusucheck-app bin/rails db:migrate || true

            echo "▶ 헬스체크..."
            sleep 5
            curl -sf http://localhost:4080/up || (echo "❌ 헬스체크 실패!" && docker logs nusucheck-app --tail=30 && exit 1)

            echo "▶ NPM nginx reload (502 방지)..."
            docker exec npm-app-1 nginx -s reload || true

            echo "▶ 컨테이너 상태 확인..."
            docker compose ps

            echo "✅ Deploy complete: $(date)"

      - name: Cleanup old images
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            docker image prune -af --filter "until=24h"
            docker builder prune -af --filter "until=24h"
